<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kalender Pendidikan - School Smart System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
    <script src="theme.js"></script>
  </head>
  <body class="app">
    <header class="app-header compact">
      <div class="logo-wrap">
        <img class="logo" src="sss_logo.jpg" alt="Logo Sekolah">
        <div class="brand">
          <div class="brand-title">School Smart System</div>
          <div class="brand-sub">Sekolah Cerdas Nusantara</div>
        </div>
      </div>
      <div class="page-header">
        <div style="display: flex; align-items: center; gap: 16px;">
          <a href="index.html" class="btn-icon" style="background: rgba(255,255,255,0.2); border: none; color: white;">
            <span class="material-icons-round">arrow_back</span>
          </a>
          <div>
            <h1 class="page-title">Kalender Pendidikan</h1>
            <p class="page-subtitle">Libur nasional dan agenda sekolah</p>
          </div>
        </div>
      </div>
    </header>

    <main class="screen">
      <section class="card" style="padding: 16px;">
        <div class="field">
          <span class="label">Bulan</span>
          <select id="monthSelect">
            <option value="2026-03">Maret 2026</option>
            <option value="2026-04">April 2026</option>
            <option value="2026-05">Mei 2026</option>
          </select>
        </div>
        <button id="showCalendarBtn" class="btn primary" style="margin-top: 8px;">Lihat Kalender</button>
      </section>

      <section class="card" style="padding: 16px;">
        <div class="section-heading" style="margin: 0 0 12px;">
          <h2>Agenda</h2>
        </div>
        <div id="eventList" style="display: flex; flex-direction: column; gap: 8px;"></div>
      </section>

      <section id="calendarSection" class="card" style="padding: 16px; display: none;">
        <div class="section-heading" style="margin: 0 0 12px;">
          <h2>Kalender</h2>
        </div>
        <div class="calendar">
          <div class="calendar-weekdays">
            <div class="weekday">Min</div>
            <div class="weekday">Sen</div>
            <div class="weekday">Sel</div>
            <div class="weekday">Rab</div>
            <div class="weekday">Kam</div>
            <div class="weekday">Jum</div>
            <div class="weekday">Sab</div>
          </div>
          <div id="calendarDays" class="calendar-days"></div>
        </div>
      </section>
    </main>

    <nav class="tabbar">
      <a class="tab" href="index.html">
        <span class="tab-icon"><span class="material-icons-round">home</span></span>
        <span class="tab-label">Home</span>
      </a>
      <a class="tab" href="keuangan.html">
        <span class="tab-icon"><span class="material-icons-round">account_balance_wallet</span></span>
        <span class="tab-label">Keuangan</span>
      </a>
      <a class="tab" href="uang-saku.html">
        <span class="tab-icon"><span class="material-icons-round">savings</span></span>
        <span class="tab-label">Uang Saku</span>
      </a>
      <a class="tab" href="notifikasi.html">
        <span class="tab-icon"><span class="material-icons-round">notifications</span></span>
        <span class="tab-label">Notifikasi</span>
      </a>
      <a class="tab" href="akun.html">
        <span class="tab-icon"><span class="material-icons-round">person</span></span>
        <span class="tab-label">Akun</span>
      </a>
    </nav>

    <script>
      const events = {
        '2026-03': [
          { date: '2026-03-20', title: 'Libur Nasional: Hari Raya Nyepi', type: 'holiday', color: '#FEE2E2', text: '#B91C1C' },
          { date: '2026-03-27', title: 'Ujian Tengah Semester', type: 'school_event', color: '#E0E3FF', text: 'var(--primary)' },
        ],
        '2026-04': [
          { date: '2026-04-10', title: 'Libur Nasional: Jum’at Agung', type: 'holiday', color: '#FEE2E2', text: '#B91C1C' },
          { date: '2026-04-22', title: 'Kegiatan Prakarya: Pameran Karya', type: 'school_event', color: '#FFEBD9', text: 'var(--alternate)' },
        ],
        '2026-05': [
          { date: '2026-05-01', title: 'Libur Nasional: Hari Buruh', type: 'holiday', color: '#FEE2E2', text: '#B91C1C' },
          { date: '2026-05-15', title: 'Wisuda Kelas 12', type: 'school_event', color: '#E0E3FF', text: 'var(--primary)' },
        ],
      };

      const monthSelect = document.getElementById('monthSelect');
      const eventList = document.getElementById('eventList');
      const showCalendarBtn = document.getElementById('showCalendarBtn');
      const calendarSection = document.getElementById('calendarSection');
      const calendarDaysEl = document.getElementById('calendarDays');

      function renderEvents(){
        const key = monthSelect.value;
        eventList.innerHTML = '';
        (events[key] || []).forEach(ev => {
          const row = document.createElement('div');
          row.className = 'history-item card';
          row.style.display = 'flex';
          row.style.alignItems = 'center';
          row.style.gap = '16px';
          row.style.padding = '12px';
          row.innerHTML = `
            <div style="width: 40px; height: 40px; border-radius: 12px; background: ${ev.color}; color: ${ev.text}; display: grid; place-items: center;">
              <span class="material-icons-round">event</span>
            </div>
            <div style="flex: 1;">
              <div style="font-weight: 700;">${ev.title}</div>
              <div style="font-size: 11px; color: var(--muted);">${new Date(ev.date).toLocaleDateString('id-ID',{ weekday:'long', year:'numeric', month:'long', day:'numeric' })}</div>
            </div>
          `;
          eventList.appendChild(row);
        });
      }

      function pad(n){ return String(n).padStart(2,'0'); }
      function keyFor(y,m){ return `${y}-${pad(m)}`; }

      function renderCalendar(){
        const [yearStr, monthStr] = monthSelect.value.split('-');
        const year = parseInt(yearStr, 10);
        const month = parseInt(monthStr, 10);
        const firstDay = new Date(year, month - 1, 1).getDay();
        const daysInMonth = new Date(year, month, 0).getDate();
        const prevMonthDays = new Date(year, month - 1, 0).getDate();
        const totalCells = Math.ceil((firstDay + daysInMonth) / 7) * 7;
        const trailing = totalCells - firstDay - daysInMonth;

        calendarDaysEl.innerHTML = '';

        for(let i=firstDay; i>0; i--){
          const num = prevMonthDays - i + 1;
          const cell = document.createElement('div');
          cell.className = 'day inactive';
          cell.textContent = num;
          calendarDaysEl.appendChild(cell);
        }

        const monthKey = monthSelect.value;
        const monthEvents = events[monthKey] || [];
        const eventDates = new Map();
        monthEvents.forEach(ev => {
          const d = new Date(ev.date).getDate();
          if(!eventDates.has(d)) eventDates.set(d, []);
          eventDates.get(d).push(ev);
        });

        for(let d=1; d<=daysInMonth; d++){
          const cell = document.createElement('div');
          cell.className = 'day';
          cell.textContent = d;
          const todaysEvents = eventDates.get(d) || [];
          const dow = new Date(year, month - 1, d).getDay();
          if(dow === 0){ cell.classList.add('weekend'); }
          if(todaysEvents.some(ev => ev.type === 'holiday' || ev.type === 'joint_leave')){
            cell.classList.add('holiday');
          }
          if(todaysEvents.length){
            const dots = document.createElement('div');
            dots.style.display = 'flex';
            dots.style.gap = '4px';
            dots.style.marginTop = '6px';
            todaysEvents.slice(0,3).forEach(ev => {
              const dot = document.createElement('span');
              dot.style.width = '6px';
              dot.style.height = '6px';
              dot.style.borderRadius = '50%';
              dot.style.background = ev.color;
              dots.appendChild(dot);
            });
            cell.appendChild(dots);
          }
          calendarDaysEl.appendChild(cell);
        }

        for(let i=1; i<=trailing; i++){
          const cell = document.createElement('div');
          cell.className = 'day inactive';
          cell.textContent = i;
          calendarDaysEl.appendChild(cell);
        }
      }

      monthSelect.addEventListener('change', function(){
        renderEvents();
        if(calendarSection.style.display !== 'none'){
          renderCalendar();
        }
      });
      renderEvents();

      showCalendarBtn.addEventListener('click', function(){
        calendarSection.style.display = 'block';
        renderCalendar();
      });
    </script>
  </body>
</html>
