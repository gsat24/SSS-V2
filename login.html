<!DOCTYPE html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>School Smart System - Login</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">
    <link rel="stylesheet" href="styles.css" />
    <script src="theme.js"></script>
  </head>
  <body class="app">
    <main class="auth-screen">
      <div class="auth-card">
        <div class="auth-logo">
          <img class="logo" src="sss_logo.jpg" alt="Logo Sekolah">
          <h1>School Smart System</h1>
          <p class="muted">Masuk untuk melanjutkan</p>
        </div>

        <form class="form" action="index.html">
          <div class="field">
            <span class="label">Email</span>
            <input type="email" placeholder="nama@sekolah.sch.id" required />
          </div>
          <div class="field">
            <span class="label">Kata Sandi</span>
            <input type="password" placeholder="••••••••" required />
          </div>
          
          <button type="submit" class="btn primary">Masuk Sekarang</button>
          
          <div style="text-align: center; margin-top: 16px;">
            <a href="#" style="color: var(--primary); font-size: 13px; font-weight: 600; text-decoration: none;">Lupa Kata Sandi?</a>
          </div>
        </form>
      </div>
    </main>
  </body>
</html>
