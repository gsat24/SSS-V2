        const state = (function initState(){
          const today = new Date();
          return { year: today.getFullYear(), month: today.getMonth(), selectedDay: today.getDate() };
        })();

        function pad(n){ return String(n).padStart(2,'0'); }
        function key(y,m,d){ return `${y}-${pad(m+1)}-${pad(d)}`; }
        function getDaysInMonth(y,m){ return new Date(y, m+1, 0).getDate(); }
        function getMonthNameID(m){ return MONTH_NAMES_ID[m]; }

        function renderTitle(){
          calendarTitleEl.textContent = `${getMonthNameID(state.month)} ${state.year}`;
        }

        function renderDays(){
          calendarDaysEl.innerHTML = '';
          const firstDay = new Date(state.year, state.month, 1).getDay(); // 0=Min
          const daysInMonth = getDaysInMonth(state.year, state.month);
          const prevMonthDays = getDaysInMonth(state.year, state.month - 1);

          const leading = firstDay;
          const totalCells = Math.ceil((leading + daysInMonth) / 7) * 7;
          const trailing = totalCells - leading - daysInMonth;

          // leading inactive days
          for(let i=leading; i>0; i--){
            const num = prevMonthDays - i + 1;
            const cell = document.createElement('div');
            cell.className = 'day inactive';
            cell.textContent = num;
            calendarDaysEl.appendChild(cell);
          }

          // current month days
          for(let d=1; d<=daysInMonth; d++){
            const dateKey = key(state.year, state.month, d);
            const cell = document.createElement('div');
            cell.className = 'day';
            cell.textContent = d;

            const items = attendanceData[dateKey] || [];
            const statuses = [...new Set(items.map(it => it.status))];
            if(statuses.length){
              const dots = document.createElement('div');
              dots.className = 'attendance-dots';
              statuses.forEach(st => {
                const dot = document.createElement('span');
                dot.className = `dot ${st}`;
                dots.appendChild(dot);
              });
              cell.appendChild(dots);
            }

            cell.addEventListener('click', () => {
              state.selectedDay = d;
              document.querySelectorAll('.day.selected').forEach(el => el.classList.remove('selected'));
              cell.classList.add('selected');
              renderDetail(dateKey);
            });

            if(d === state.selectedDay){
              cell.classList.add('selected');
            }

            calendarDaysEl.appendChild(cell);
          }

          // trailing inactive days
          for(let i=1; i<=trailing; i++){
            const cell = document.createElement('div');
            cell.className = 'day inactive';
            cell.textContent = i;
            calendarDaysEl.appendChild(cell);
          }
        }

        function renderDetail(dateKey){
          subjectListEl.innerHTML = '';
          const items = attendanceData[dateKey] || [];
          if(!items.length){
            const empty = document.createElement('div');
            empty.className = 'subject-item';
            empty.innerHTML = '<div class="subject-info"><div class="subject-name">Tidak ada data kehadiran</div><div class="subject-time">—</div></div><div class="subject-status absent">Tidak Ada</div>';
            subjectListEl.appendChild(empty);
            return;
          }
          items.forEach(it => {
            const row = document.createElement('div');
            row.className = 'subject-item';
            row.innerHTML = `
              <div class="subject-info">
                <div class="subject-name">${it.name}</div>
                <div class="subject-time">${it.time}</div>
              </div>
              <div class="subject-status ${it.status}">${labelStatus(it.status)}</div>
            `;
            subjectListEl.appendChild(row);
          });
        }

        function labelStatus(st){
          switch(st){
            case 'present': return 'Hadir';
            case 'sick': return 'Sakit';
            case 'permit': return 'Izin';
            case 'absent': return 'Alfa';
            default: return st;
          }
        }

        function changeMonth(delta){
          const m = state.month + delta;
          if(m < 0){ state.month = 11; state.year -= 1; }
          else if(m > 11){ state.month = 0; state.year += 1; }
          else { state.month = m; }
          // reset selection to 1
          state.selectedDay = 1;
          renderTitle();
          renderDays();
          renderDetail(key(state.year, state.month, state.selectedDay));
        }

        prevBtn.addEventListener('click', () => changeMonth(-1));
        nextBtn.addEventListener('click', () => changeMonth(1));

        // initial render
        renderTitle();
        renderDays();
        renderDetail(key(state.year, state.month, state.selectedDay));
      })();
